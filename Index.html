<title>Put A Girl On</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    height: 100%;
    width: 100%;
    overflow: hidden;
    background: #000;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    touch-action: manipulation;
  }
  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
  }
  .btn {

    border: none;
    border-radius: 999px;
    padding: 28px 48px;
    font-size: 34px;

    cursor: pointer;
    box-shadow: 0 10px 40px rgba(255, 45, 138, 0.5);
    transition: transform 0.08s ease;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }
  .btn:active { transform: scale(0.96); }
  .status {
    color: #666;
    font-size: 11px;
    font-family: monospace;
    text-align: center;
    padding: 0 20px;
    max-width: 90%;
    word-break: break-word;
  }
  @media (max-width: 480px) {
    .btn { font-size: 26px; padding: 22px 36px; }
  }
</style>
</head>

  // Decode base64 -> Uint8Array
  function b64ToBytes(b64) {
    const bin = atob(b64);
    const bytes = new Uint8Array(bin.length);
    for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
    return bytes;
  }

  let audioCtx = null;
  let audioBuffer = null;
  let blobAudio = null;

  async function setup() {
    // 1) Try Web Audio API with WAV bytes (most reliable when it works)
    try {
      const Ctx = window.AudioContext || window.webkitAudioContext;
      if (Ctx) {
        audioCtx = new Ctx();
        const wavBytes = b64ToBytes(WAV_B64);
        // decodeAudioData needs its own buffer
        audioBuffer = await new Promise((resolve, reject) => {
          audioCtx.decodeAudioData(wavBytes.buffer.slice(0), resolve, reject);
        });
        status.textContent = 'ready (webaudio wav)';
        return;
      }
    } catch (e) {
      status.textContent = 'wav decode failed: ' + (e.message || e);
    }

    // 2) Fallback: make a Blob URL (iOS handles this far better than data URIs)
    try {
      const mp3Bytes = b64ToBytes(MP3_B64);
      const blob = new Blob([mp3Bytes], { type: 'audio/mpeg' });
      const url = URL.createObjectURL(blob);
      blobAudio = new Audio(url);
      blobAudio.preload = 'auto';
      blobAudio.load();
      status.textContent = 'ready (blob mp3)';
    } catch (e) {
      status.textContent = 'blob fail: ' + (e.message || e);
    }
  }

  function play() {
    if (audioBuffer && audioCtx) {
      if (audioCtx.state === 'suspended') audioCtx.resume();
      const src = audioCtx.createBufferSource();
      src.buffer = audioBuffer;
      src.connect(audioCtx.destination);
      src.start(0);
      return;
    }
    if (blobAudio) {
      blobAudio.currentTime = 0;
      const p = blobAudio.play();
      if (p && p.catch) p.catch(err => {
        status.textContent = 'play err: ' + err.message;
      });
      return;
    }
    status.textContent = 'no audio loaded yet';
  }

  btn.addEventListener('click', play);
  setup();
</script>

</body>
</html>
